<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RawData</title>
    <!-- Incluyendo Google Fonts para mejor tipografía -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            font-size: 2.75rem;
            color: #111827;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: -0.025em;
        }

        h2 {
            font-size: 1.5rem;
            color: #6b7280;
            margin: 0;
            font-weight: 400;
        }

        .graphic-container {
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            padding: 24px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            animation: slideUp 0.8s ease-out;
            transition: transform 0.3s ease;
        }

        .graphic-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        object, img, svg {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 { font-size: 2rem; }
            h2 { font-size: 1.25rem; }
            .graphic-container { padding: 16px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Infovis</h1>
        <h2>Crimen en Nueva York</h2>
    </header>

    <main class="graphic-container">
        <!-- El tag object es ideal para SVGs ya que preserva interactividad -->
        <object data="vis.svg" type="image/svg+xml" aria-label="Gráfico de Crimen en Nueva York">
            <!-- Fallback para cuando el SVG no cargue -->
            <img src="vis.svg" alt="Gráfico de Crimen en Nueva York" />
        </object>
    </main>

</body>
</html>
